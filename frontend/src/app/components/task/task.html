<div class="task-card">
  <div class="task-header">
    <h4 class="task-title">{{ task.title }}</h4>
    <div class="task-actions">
      <button class="btn-icon edit" (click)="editTask()">&#9998;</button>
      <button class="btn-icon delete" (click)="deleteTask()">&times;</button>
    </div>
  </div>

  <div class="task-date" *ngIf="task.limitDate">
    <span>&#128197;</span> {{ task.limitDate | date:'dd/MM/yyyy' }}
  </div>
</div>
