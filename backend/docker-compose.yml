services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban_db
    restart: always
    environment:
      POSTGRES_USER: user_kanban
      POSTGRES_PASSWORD: password_kanban
      POSTGRES_DB: kanban_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: